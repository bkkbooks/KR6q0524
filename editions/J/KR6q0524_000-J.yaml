front:
  text: 長明禪師語錄序海內禪宗激揚祖道者代不之人若夫繼續心燈親承密印振鐸斯世闡發奧旨播之語言文字間而一時緇白欽歸而推重其人宣傳其言相與尊之禮之以共稱揚於名勝之地是當時之善姓固因言以傳其人而不知其人之實副於言與人之有補於名勝之地為之也余宰沅邑歲經數易所謂名山大川所稱善知識者余嘗疑其以勝地為郵舍以說法為聲聞者有之猶未之過而扣焉時有長明禪師者初遊龍泉山相侍於穎秀老人之門勤修參悟蓋以有得遽老人示寂後師乃首立法幢於澧之七星山次豎剎竿於沅之明山復自沅歸辰掃穎公塔返舟經浦市而士庶耆老久聆師德茲幸質之遂延入浦峰禪寺請主法席雖人之遇合有機寺之興廢有數師之行藏有地咸於此可概見矣師自入是寺睹其殿閣樓臺自經兵燹盡屬傾圮遂令剃度弟子各領職事苦行募修未及三年百廢俱舉是師之有功於興廢師之不以勝地為郵舍也殳寺成大觀開堂說法出昔之所悟者達之於言即以今之所言者傳之於後相與登進後人振醒蒙昧一片婆心期披宣於生前甚無已也未幾而師圓寂遂塔於寺之左其嗣法門人法柱大師以所輯請余為之序余亦何以辨師之行之有異而為之辭緣訪之紳衿耆老稔述其人非復聲聞說法空言無補之可比也余始取其所著而閱之見其言每從靜悟中出字字性宗句句真偈余乃焚香遙禮三復其語心意豁然始知有真善知識在邇惜哉覿面難逢緣乎緣乎余用是服其人之可傳非僅傳夫言也蓋以服其人之有德於言而言與人之可並傳也後之君子讀是錄也即師之語以思師之人且以思師之勞心於勝地及終塔於是地者以思其語與人爾浦峰自是其不朽已師之語錄獨可斁歟康熙壬子歲中秋知沅陵縣事西蜀梓州髮弟子李昌齡沐手拜題長明炅禪師目錄上堂示眾頌古牧牛頌四威儀法派聯芳法語示偈雜偈七言八句五言八句七言四句五言四句佛事塔銘
