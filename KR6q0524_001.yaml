也是依他作解尋常日用舉動施為無不承此恩力無不秉此威光唯在一念不生前後際斷不落情識意想超出知解見聞迥然透脫惟一清虛則通身無影相遍界不曾藏頭頭法法大用現前拈一莖草現丈六金身將丈六金身現一莖草上爾輩隨吾杖頭有年急須勵志操履學識不群見地明敏養得如獃如癡證入文殊普賢大人境界只待霜露果熟方提持向上一著紹續祖風規繩後學從自己胸中流出蓋天蓋地受用豈有窮極耶勉旃示大徹胡居士佛祖出世特為此段大事因緣欲令人人回光自照直下大悟大徹剋證本源自性法身今上人者號曰大徹蓋大者法身浩大充滿法界應遍恒沙佛國徹者智鑑照徹頭頭上顯物物上明隨處作主遇緣即宗縱橫妙用一概無私向者裏識得大徹之旨說甚麼在家出家分別同異哉所謂百千法門無量妙義惟在一毛頭上識得根源若識得一毛頭上根源便是步步踏著實地頭頭顯露真常可以與維摩居士共一鼻孔出氣但居士一片誠念護持山埜予豈不以直心相酬八字打開無背無向只要居士覿面承當薦得分明其或未然正好將個萬法歸一一歸何處蘊在胸中猶如一柄利劍相似不容是非鋒起纔有起處一劍斬斷只將此個話頭疑著疑來疑去動靜忙閒打成一片疑到那人忘情絕志泯心灰忽然大夢覺來始知者著弗從人得本自固有家珍方信法身大也智鑑徹也覿體全彰無藏無覆觸著磕著總是神通妙用到者裏管教受用不盡快活平生示我靜趙居士一見一聞更莫別尋明明至道歷歷天真縱橫妙用無不現成勤加精進勿染貪嗔諸緣截斷體究無生其志愈固其道愈親閒忙動靜一片純真洞開正眼本自圓成靈光獨耀迥脫根塵頭頭上顯物物上明芬芳垂露菊藥生雲山搖翠色鳥唱玄音滿眼滿耳非色非聲咄高著眼莫自謾識得者些消息子無邊法界我為尊示雲棲胡居士大道洞然本無愚智貴在自己腳跟立穩行之不疑守之不易如此日益日新故曰操則存捨則亡耳但居士一段英銳夙熏智種雖處塵緣慕道心切終不被情雲愛水埋溺靈根可謂就塵勞而作佛事即煩惱以證菩提山埜所以只要居士更進一步直下親切頂門具眼勿外馳求好向自己六根門頭內回光洞照一一究研精奧時節到來心花發燦八面玲瓏始知黃花翠竹灼然意氣全彰綠水青山悉是當人受用頭頭合道物物皆真觸目逢緣總歸快樂如斯信得及彌勒釋迦盡在者裏更無別法也珍重示恒智文居士學道之士唯在竭志出大信力知有向上一著本真妙圓蕩然虛寂從無始劫來曾不間隔至於日用二六時中舉動施為全憑此大機要若能直下透脫不與千聖同途不其諸塵作對唯是湛若虛空凝然不動觀生死去來如夢如幻豈有彼我是非得失計較耶誠患信門不堅腳跟不穩不能徹證直須當下超脫意想情識一念無為萬緣截斷胸中潔潔淨淨蕩然脫灑隨處作主遇緣即宗物物頭頭皆自天真妙用佛法世法總成一片獨耀堂堂金剛正體此乃解脫截徑即塵勞而入佛界矣示恒遠彭居士熏風乍拂梅雨初收新荷開一池之綠細雨拖兩岸之青山花鳥語一一顯露者個消息不假文字語言而自具足現成矣我恒遠彭居士得大信力更乞山埜一言以勵精進之志予曰此個法門本無言說相盡力吐不出個元字腳來只如行到銀山鐵壁處作麼生轉身聊拈一偈以進之看取山雲水月情人人鼻直兩眉橫還將兔角拈為杖擊得虛空嚗嚗聲示唐居士靈山拈花微笑少室斷臂安心無非直截提持當人本地風光不假修證不從人得是凡是聖無欠無餘或動或靜皆承此個恩力雖在日用間而不自覺也今居士夙因不忘靈機不昧初以念佛為業信入有年後來浦峰乞授戒法要明向上一事果能腳跟穩當披衣自看忽然看得衣珠朗瑩始知拈花微笑斷臂安心猶是無事生事何故我從本已來成佛舊矣送別懶木禪友頂門拶破一輪紅機用超群迥不同萬仞巖前垂隻手千峰頂上現全功操持臨濟金剛劍吞吐楊岐栗棘蓬任是銅頭鐵額者收歸大冶爐韝中贈明山法柱上座數載明山不露蹤汝今高步水雲從一莖楖栗親分付處處逢緣驗象龍示辯賢禪人持戒東身非解脫安禪斷妄總勞神不如一念無為去始契西來祖意親示淨朗禪人百草頭邊自豁然明明獨露祖師禪但能著眼腳跟下一段光明遍大千示悟一禪人秪須悟一不須多直下惺惺著意磨有時磨破泥團子石人撫掌笑呵呵示佛照禪人一輪杲日耀中天照徹山河萬象全直下恁麼開隻眼何人不與佛同肩贈石印禪人玲瓏石印字無鉤印破虛空笑點頭珍重闍黎勤護惜當機拈出印同流送定白禪人嵩山當絕頂別是人間境犬吠白雲端猿啼青嶂嶺現成好公案端的使人惺索我草鞋錢腳跟須立穩示鐵腳禪人杖撥金鱗解轉頭振鬚奮翼出淵流有時躍入龍門內引得風雷鼓不休示朗然禪人鼻祖西來意洞然歷歷明頂𩕳開正眼柏子自青青示覺我禪人覺我覺非我非我覺誰人我人俱不立應用自天真示慧徹禪人爾問山僧向上機山僧問爾問來誰就中識得誰來問夜放烏雞雪上飛示宗知禪人案山疊疊綠蘿垂花滿枝頭水滿溪聞見現成元不昧何須合掌問禪機示含真符居士持金剛經拶破口門舌廣長無持持處即金剛個中正念常相續莫學蒙童數墨行示默識符居士指君父母未生時面目儼然那欠虧山是山兮水是水個中默識是為誰示恒潤化主鑄千僧鍋浦峰苦行個頭陀千口缽同一口鍋只待鑄成時著力大開飯舖接禪和山居十一首平常無事得閒饒畢竟閒將甚處消晚剔寒燈翻貝葉旦鋤曉日種青苗千峰埜色入簾靜一枕溪聲帶雨潮舊日臺城莫復問松關時出看漁樵雲壑幽深不掩扉家風與世竟相違泉流清濯林間耳山靜言忘物外機峰頂沖霄容我足崖懸碧仞許誰歸分明獨露劫前事一道神光萬古輝自惜寥寥祖道危白雲深處掩柴扉鐺支品字煨松米葉剪成文補毳衣萬境空來忘管帶一機休去絕離微雖同世外煙霞老懶把龜毛拂子揮滿目雲林世念灰蕭蕭石徑長蒼苔天高曉色頻相照澗泛濤聲獨自來寧使幻軀藏埜壑休將清志易名才荷衣松食甘隨分德重丘山憶大梅住處幽閒別一天玲瓏四壁絕塵煙谷風時送雲來往竹影頻移屋後前翠草懶除階石沒落花慵掃埜苔研有人問道山中事山色青青是自然歷遍諸方向上禪何如碧嶂寄生緣茅廬空寂留雲住竹榻清虛抱日眠道在目前由自用法非心外許誰傳古今幾得忘塵世唯有燒菴大隱賢謾道休心母自欺幾歸青嶂縛茅茨攀龍附鳳憑人愛步月吟風我自怡清浢出嶙難免濁白圭受玷豈為奇自從巢許潔身去誰向溪邊洗是非雲瓢雪笠放身閒跡寄崚嶒煮碧泉補衲芰荷收夏日燒鐺木葉掃秋天缽盂唯仗青猿洗書信無勞白大傳藜杖緩扶千嶂外優游風景翛然自愧愚頑恐世嗔千峰峰外寄閒身徘徊有意敲風月應對無心驗主賓谷口漱泉龍吐水樹頭刷羽鳥啼春分明聞見非聲色可惜人多認不清道人閒放卻山行天外浮雲染袖襟竹杖點穿潭底日棕鞋踏破草頭春危巒峻嶺開心印幽澗清溪轉法輪如是風光無間歇苟非同道欲誰親頻交山埜最長情日用生涯本現成葉落無窮添石灶泉流不斷就砂鐺閒來採菌和雲煮時去拈蒿帶露烹者段家風真快活何須持缽入王城秋夜舟泊祭風臺閱石刻懷古薄暮扁舟泊楚湘寥寥誰問古松篁臺貽術合風遠石勒詞同水韻長霧翥峰頭猶浸溼月穿波應自生涼鵊啼未盡當年意疊疊空山花自香別周侍御南北閒遊不定方白雲無繫任飄颺杖挑日月清風遠袖拂煙霞道路長千古名藍留玉帶三年法席荷金湯何時再憶靈山約相共同開選佛場登黃鶴樓開窗極目詠來頻何處堪追往昔人岸上白雲迷草樹壁間黃鶴出風塵山河壯麗獨稱楚樓閣巍峨尚憶辛煙景凄凄牽客興悠然一笑兩城春春日送社友冰消古岸水生雲風拭長堤柳眼分叫客埜猿深澗度喚人幽鳥隔林閑金鱗透海誰能識靈翮摩天孰與群此日送君春興遠好將祖令振乾坤過桃源洞武陵西入避秦境千載峰巒疊翠蒼松老無枝棲鶴冷山寒有雨帶雲茫洲頭船爛沙生草洞口桃開水瀉香珍重漁郎津莫問溪源盡處是仙鄉春日雨霽風剪溪雲徹磬聲門前山色畫圖明雨收日霽乾坤靜霧斂空澄海岳清花燦薜蘿堪舞蝶柳明沙岸亂啼鶯斯時漸覺寒煙退揭露春光滿上林麻陽縣令陳公過訪次韻諱五典形影多年寄此山曾無餘跡到人間君來相訪藤條直我憶難酬玉帶環五夜敲詩隨竹詠三更步月傍溪還白雲也愛深幽處飛入茅簷作護關遊白雲菴與傳宗主人山寺眠雲翠幾層綠陰滿徑拂垂藤松蒼宜寄天邊鶴竹密堪藏世外僧夜淨翻經隨月轉曉晴策杖共雲騰禪棲處處皆蓮社何必廬山又遠登中秋喜友人至明月相看意趣濃故人何幸得重逢槎乘澧水昔年共詩賦辰山此夕從唯把酒卮消世事慵將古鏡照衰容翻思千里舊遊處秋水連天兩地同題浦峰寺空山鹿苑宋時封雲鎖參差閣幾重竹影蕭蕭鋪淨几松聲謖謖落疏鐘烽煙變態昔人去荊棘刪開適我逢三載煥然成法席脈傳臨濟五湖通金陵延壽菴阻雨贈潤石主人扶笻登古寺山色影沉沉竹徑輕風冷松庭積霧陰流泉頻瀨石幽鳥倦啼林且喜主人意慇懃慰客心過洞庭湖中流浮一葉雨霽度寒煙水面涵天碧波心浴日圓山從畫裏出舟向鑑中旋飄渺無匯際乾坤盡坦然雨霽雨後空如洗天街水氣涼松窗穿日影草閣射晴光石澗流泉韻山花帶露香綠陰青嶂外歷落鳥聲長龍標山晚眺閒步清江上遊魚自往來青山煙外賞白眼世間開喝石連雲走拈花帶露回蓬門應未掩待月且擎杯夜別友人永夜鐘聲盡紗窗映碧空有星皆向北無水不流東明月千秋共清風萬里同感懷重訂約彈指話奇逢七星留別九旬駐錫歡偶爾話離難拽杖尋幽僻隨雲度別巒人情懷日暖客興怯春寒若憶知音句溪聲時與譚春日遊山林深啼埜鳥巖碧著雲衣怪石纏藤瘦疏梅點雪肥江濤浴日冷山色帶春輝快我閒遊處東風杖底歸再登七星山有感三年雲夢遠今喜得重遊柳復垂幽徑松仍蔭古丘開眸山色舊洗耳水聲悠坐共三生石愴然失故儔別惟政大師次韻聚首雲林春色深胡為此日卻分襟一莖杖指青山遠對月敲詩孰共吟題畫歲歲江山未改青煙波渺渺聽無聲漁翁艇繫蘆花岸不釣寒江臥月明春興曉立東風淑氣催寒梅崖畔幾枝開松深竹冷遊人少鳥宿庭階啄綠苔詠竹四首硯墨池香欲寫詩得君青色又呈題風牽雲斷山升日影入書窗畫翠枝影掃苔塵塵不移枝枝偏與靜相宜風高且寄雲深處出釣金鱗定有期幽居實籍爾為籬高節凌虛逼四圍密葉豈容蝴蝶戲疏枝惟待鳳凰棲拄地撐天節操高雲霞堆裏鼓波濤心空未有煙塵跡只與松梅作故交過蟠龍菴秋江淺水碧沙明引入淵源一派清轉盻老龍蟠杖底風雲相送浪頭平秋日送友人之武陵橫江分秧撥艫艟一葉飄然煙霧中時出武陵山色好滿斟對菊駕同風送大量禪人爾我相依一載周臨行一句話難酬狂心歇處家山近切忌逢人弄舌頭送禹南禪人擔囊負缽入深彎將謂通身放下閒無那風寒難久泊又隨雲水過他山九日黃花流翠艷天外碧雲重賞興雖無酒登樓別有峰中秋庭際秋光早何如此夜清山河群象影盡與月同明佛事為法輪禪人起龕觸目菩提絕無真偽來亦無來去亦無去昨夜泥牛海底行今朝石虎高插翅遂拽杖引行舉火炬云煙霧飄飄籠大地雨花片片散長空壁間驚徹龍飛起萬別千差一路通攛下云烈焰光中無一髮人間天上總清風為澹泊禪師下火閒雲澹蕩出沒太虛正體凝然一塵不立伏惟大方閣澹泊禪師所得真誠用處俊拔來去關頭坐斷廓然當體無依末後一著不帶皮膚惟存真實舉火炬云還見真實處麼攛下云萬里無雲不肯住三賢十聖一時超重修酉陽天雲山浦峰寺序三楚之上五溪之中天雲寶山浦峰禪院真龍象蟠居之所乃檀那積福之場天然蒼古不假鑿為錦江玉浪長迎大覺之門翠嶂雲山盡拱螺峰之頂松風鳥語頌不二之圓音草樹村疇現至真之實相山花蘿月篆不彫之心印樵歌漁唱顯不說之真常珠樹玲瓏錫飛近鶴清江繚繞缽出潛龍不啻鷲嶺巍峨境培祗園壯麗堪嗟烽煙變運難為見聞珠宮紺殿困荊棘之圍月相金人遭塗炭之慘花墮淚而庭荒鴉亂雲封樹而徑冷苔生黠鼠每居廚積妖狐恒驟雲堂幸我朝定鼎以來皇風蕩蕩帝道平平欲將梵剎再整般若弘通或現宰官居士惟願不忘靈山附囑大家齊出手眼扶整法席名傳萬古清高追復古風聲播千秋大雅施金施粟無非大事因緣助棟助梁悉是當人受用信得及正好大破慳囊見得透不妨鋪花錦上莫謂善財一去杳無消息他時春來門外芳草自青急須直下承當慎勿覿面錯過謹序長明和尚塔銘公諱性炅號長明蜀東涪陵石氏子也有嗣法門人法柱求銘於予以為久長記予按公行實幼年禮極初老宿剃落復從渤水法師習大乘經論公昔年曾遇象崖和尚知有此事雖看教中語言知非極則迺上黔中思南東山參穎秀悟和尚直叩濟北宗旨公立願不睡夜靜坐間忽然如人拍一掌相似不覺通身汗下一日悟上堂公出問上無佛道可成下無眾生可度是何人境界請和尚道破悟云高高處觀之不足低低處平之有餘公云千差萬別不出者裏悟云切莫錯認公便喝悟云者一喝落在什麼處公云當陽突出已相呈悟云卻是闍黎道破悟行道楚之西陽公侍悟同住辰州龍山任維那事紀綱龍象日夕激揚聲名大振以帥眾多年志欲居山悟付曹溪正脈公出龍山行到澧州慈利值大休禪師道徹胡居士我靜趙居士延住七星山瞻仰道範俱生喜躍感悟夙因轍請開法聞公垂示得未曾有時沅州聆公道望請住明山公隨機開導闔郡皆親槌拂康熙丁未歸龍山掃悟和尚塔復上沅江過浦市鄉紳士庶耆舊歸宗特虛浦峰法席請主其事蓋浦峰自宋嘉定年開刱屢經兵燹殿閣樓臺漸成傾圮公力為重建時有剃度弟子百餘人各領職事交相肘腋未及三年百廢俱興頓成大觀四來瓢笠共集如雲眾檀越護法居士等請公開堂公唯施本色鉗鎚請益門人甚多得法者有法柱棟公止岸慈公二人焉越明年公示微恙叮嚀訓眾努力辦道端坐而逝塔於寺之左時四方僧俗聞者莫不流涕以公素行真誠其德感人如此乃為之銘曰本質貞誠生緣涪上參叩諸方眾中龍象哦褫東山互相唱和一喝當陽闍黎道破湖北酉陽信杖所指澧州沅州行道之始浦峰虛席待公重振三年開拓百度維新衲僧四來單提正令獅子同群門庭最盛隻履歸時猶打口鼓緇素感傷淚下如雨塔於寺左平生事全法胤繼起正脈永傳康熙壬子年六月日蓮月正道人撰康熙辛未歲蒲月法孫慧渠岱敬刊
