body:
  text: 嗣法門人海棟編師在龍山受眾檀越請住辰州天雲山浦峰禪寺於康熙丁未歲九月一日入院眾檀越請上堂僧問昔日靈山會上人天普集世尊拈花示眾今朝浦峰寺裏海眾雲臻且道和尚將何惠施師云拄杖頭邊明歷歷進云學人腳跟點地去也師云好與三十棒問佛未出世祖未西來且道還有佛法為人麼師云諦聽諦聽進云聽個甚麼師云知音不必頻頻舉達者須知暗裏驚進云金雞抱子歸青嶂野鶴穿雲出碧霄師云也要闍黎具隻眼乃云梵苑弘開慶雲結蓋流通般若舉唱宗乘作不可思議奇特事成無量法門殊勝因若能直下迥超聞見透脫識情松風鳥語演不盡圓音水綠山青現至真實相法法頭頭渾成大用更不犯手傷鋒須知建化門中有坐斷天下人舌頭分驀拈拄杖召眾云且看浦峰門下全明全暗全放全收舉止自在不易絲毫正當恁麼時且道人境相稱一句作麼生道龍得水時添意氣虎逢山勢長威獰十月十五日本郡眾護法請開爐上堂指法座云者個寶華王覿面相呈本無向背擊一下云敲開正眼腦後見腮遂陞座拈香云此瓣香根培地厚幹挺天高金枝懸日月之光照臨萬象玉葉吐山河之秀覆幬八荒熱向爐中恭為今上皇帝祝嚴聖壽萬歲萬歲萬萬歲伏願皇基等南山之固帝德齊北極之尊此瓣香威音那畔正體全彰朕兆未分通身顯露奉為闔國文武公卿當道勳貴縉紳文學伏願功著唐虞之日位重三台力振佛祖之風名高八座此瓣香大爐韝中幾回煆煉智竭情枯一朝契證惡辣手中得來逢人觸發生燄今為酉陽龍山虎谿堂上傳臨濟正脈第三十三世穎秀和尚以酬法乳之恩伏願生生為人天眼目世世作佛祖鉗錘乃攝衣就座維那白槌云法筵龍象眾當觀第一義師豎拂子云第一義諦耳聞目擊若向聲色堆頭薦得已落二三若離聲色堆頭薦得落七落八且二途不涉作麼生湊泊久參上士出眾激揚僧問者個消息前無形後無影向甚麼處搆取師云鼻孔大頭向下垂進云頭頂青天腳踏實地去也師云直須看腳下問坐具蓋覆恒沙界拄杖撐開劫外天猶是門外風光未審如何是今日正令師打云且將此意為君通進云棒頭痛徹通身快不落尋常第二機師云闍黎具個什麼眼僧便喝師復打乃云選佛場開人天普集門庭孤峻不設階梯言外承當者早已途轍機前負荷者猶涉簾纖要且升堂不許挑燈入室不勞撥火目前萬法本自如如隨緣不變處鬧常寧卷舒自在氣宇吞空寶劍橫抽全行正令闡大機發大用提持佛祖鉗鎚開鑿人天眼目共助無為之化用酬不報之恩大眾茲值時豐道泰海晏河清開堂祝聖一句作麼生道五分香雲五色瑞萬年天子萬方寧復白槌云諦觀法王法法王法如是下座上堂問如何是奪人不奪境師云兩眼看青山進云如何是奪境不奪人師云通身無一物進云如何是人境兩俱奪師云晴空無片雲進云如何是人境俱不奪師云松下閒趺坐進云秪如黑白未分無人無境何處辯親切師豎拄杖云高著眼問橫按莫邪時如何師便打進云未犯鋒鋩時如何師云早已血腥遍地了也進云忍痛不徹不放過和尚時如何師云未是闍黎作用乃云掀翻末後一著坐斷毘盧頂門撥轉向上一機裂破祖師鼻孔洞視渺邈囊括十虛設使文殊大智莫測端由普賢威神失其境界到者裏添一些子如眼中著刺減一些子似肉上剜瘡便見陸地平沉豈有佛法商量者哉今日山僧不免從猛虎穴中奪子獰龍項下解珠豎拂子云三世諸佛在者裏放大光明諸人見麼復以拂子擊禪床云歷代祖師在者裏轉大法輪諸人聞麼若也見得透聞得徹古今盡在目前凡聖同歸一致山河大地總顯真常拈起也萬機齊赴放下也十聖潛蹤只如不拈不放又是何人境界還委悉麼古佛本身元獨露堂堂直下絕纖塵上堂問座上獅子吼格外展宗風如何是親切句師云鼻直眼橫進云如何是全體作用師劈頭一棒僧擬開口師復打問狼煙掃盡大地清寧祖令高提弘機獨振如何是利物興慈句師云人人共睹此時風進云如何是轉凡成聖句師震威一喝進云恁麼即心空及第歸去也師云秪恐不是玉乃云脫體無依徹骨貧秪因自肯乃方親寥寥意外渾無物綠水青山共此身如是則知會萬物為己者其唯聖人乎所以道我有時見山不是山見水不是水見男不是男見女不是女見色不是色見空不是空我有時見山是山見水是水見男是男見女是女見色是色見空是空若向者裏會得明暗同歸一轍收放總共一源諸緣無以階梯萬象不能覆藏一語一默一動一靜皆衲僧巴鼻且不涉語默動靜一句作麼生道萬里山河收眼裏十方世界契本真上堂者個極則事三世諸佛有口難開歷代祖師全提不起一大藏教詮註不及今日說個甚麼山僧自揣口門窄只好引則古人因緣以酬所請舉藥山久不陞座院主請為眾說法山令打鼓陞座良久下座院主白云大眾久思法誨因甚一詞不措山云經有經師論有論師爭怪得老僧師云藥山老漢可謂光前絕後把斷要津爭奈知恩者少負恩者多若是山僧則不然或有人問道因甚一詞不措秪對他道不可向虛空裏掘洞待伊擬議正好劈脊亂棒打出不惟與天下衲僧抽釘拔楔亦且流通正眼大眾還委悉麼龍袖拂開全體現象王行處絕狐蹤值雪上堂問天地不能蓋載日月不能照臨且道是何人境界師云名不得狀不得進云今日是何境界師云別有風光一段奇進云明日又是何境界師云退後看進云看個甚麼師打云看明日境界乃云東西南北通同前後左右透徹突出無孔鐵鎚觸碎虛空竅穴驚起他藤六神無處覓藏身訣喝一喝云卻被山僧一喝大降彌天瑞雪忽然宇宙同源俄爾乾坤一色鐵龍轉見威猛石虎重增挺特宛然一段風光古今目前親切浦峰看取分明告報兩堂禪德不被前境相謾關山了無阻隔直下略自返觀諸相一齊勦絕廓然腦後見腮坐斷十方差別凍得布袋和尚撫掌呵呵太悅且道他悅個甚麼心生大歡喜自知當作佛佛成道日上堂問世尊未睹明星時如何師云眉橫眼上進云睹明星後如何師云眼橫眉下進云本來者一著了了太分明為甚麼卻有悟不悟師云只為太分明乃云頂門具眼千聖無以等階腦後見腮十方從此坐斷堂堂無回互一一絕羅籠今日浦峰不惜眉毛普為諸人點破驀豎拄杖云向者裏透脫得去正好不向佛求不向法求不向僧求人人本有個個圓成蠢動舍靈悉皆具足豈不見釋迦老子初出母胎指天指地便道唯吾獨尊八字打開早已分付了也復向雪山睹明星嘆奇哉又是一番漏逗若是個出群漢一眼覷透便見玉轉珠回處壁立萬仞壁立萬仞處玉轉珠回可以拈兔角杖攪長河為酥酪用龜毛拂變大地作黃金豈待後來四十九年三百餘會重重入泥入水堪作甚麼雖然如是現前若有羅籠不住呼喚不回的向未鳴鐘鼓之際未出方之先撩起便行山僧合掌讚嘆不及何故寒山逢拾得轉笑轉相親元霄上堂問梅花開雪裏臘去復春來如何是不涉新舊句師云年年此日歲歲今朝進云有意氣時添意氣不風流處也風流師云向甚處添得許多光彩來乃云今霄共賞太平年露柱燈籠盡快然盡力若能挑撥轉光明滿眼照無邊且道那裏是挑撥處莫不是三世諸佛說下一大藏教歷代祖師說心說性論事論理是挑撥處麼料掉沒交涉莫不是臨濟行棒行喝雲門說露說普曹洞立君立臣溈仰分體分用法眼指物指心是挑撥處麼料掉沒交涉莫不是諸人日用尋常中穿衣喫飯屙屎放尿運轉施為是挑撥處麼料掉沒交涉莫不是今日監寺營齋普請諸人著衣持缽三匙五觀是挑撥處麼料掉沒交涉既總沒交涉作麼生是挑撥處以拄杖指云我見燈明佛本光瑞如此解制上堂問把斷要津不通凡聖解開布袋一任縱橫把住解開即不問超宗越格事如何師云自有群作略進云三祗鍊就金剛種一旦新開般若花且道作用在甚麼處師云拄杖橫肩不顧人進云驊騮不待窺鞭影快俊追風過九逵師云猶未唧溜在乃云九旬盡地為牢個個在裏許東涌西沒左轉右旋任性逍遙優游自在只得千差坐斷分明一體同然有甚麼結有甚麼解若解丹霄獨步何防宇宙橫身且出門慶賞一句作麼生道芒鞋腳底龍蛇活拄杖頭邊日月懸住澧州七星山菩提禪院上堂僧問一天光影重重見照徹山河萬象全如何是七星境師云蒼松夾曉嶂瀑布挂寒嚴進云如何是境中人師云掃雲開曲徑掬水入深溪進云人境俱蒙師指示常陽一著事如何師云眼上眉毛分八字進云觸目無非向上機師云森羅萬象絕疏親乃云靈光獨耀迥脫根塵離相離名蓋天蓋地既然內絕淆訛要且外無點翳無一物不彰大用無一法不顯真乘了了更無回互堂堂覿面相呈今朝四眾強請山僧登曲彔木床未免當陽指出乃豎拂子云屋後青山疊疊門前綠水澄澄左看竹影參差右聽松聲歷落總是山僧拈來拂子頭上七縱八橫無同無異然雖如是且超聲越色一句作麼生道萬仞巖前能撤手千峰頂上現全身住沅州明山太和禪院上堂僧問塞卻鼻孔坐斷舌頭作麼生出氣師云頂門上七縱八橫進云取用時如何師云腳跟下玉轉珠回僧便禮拜師乃云芷水年年綠明山歲歲青廓然空劫外何處有遷更如是則知天地同根萬物一體凡聖一源古今一道人人壁立萬仞個個常光現前不假修為本來成現雖然如是即今椎鐘擂鼓四眾雲臻虎驟龍驤當機𨁝跳還有空劫已前消息也無良久云但見落花隨水去不知流出洞中春上堂一僧纔出師云止止不須說我法妙難思僧拂坐具師便喝僧亦喝師便打又一僧出云某甲禮拜是不禮拜是師拈棒云山僧打即是不打即是僧退後三步進前三步師云不是不是乃云今朝衲子當機一味棒喝齊施不是強生枝節要人翻轉面皮眾中還有翻轉者麼如無且看木上座自翻轉去也擲拄杖下座為道徹胡居士披剃上堂瞿曇昔日棄皇宮道徹今朝辭俗業時節古今雖不同轉身要且路無別大眾還識轉身路也麼卓拄杖云入此大解脫門遊此大莊嚴路目前萬別千差直下一刀兩段更無遮欄更無回互如杲日麗天似明鏡當臺羅籠不肯住呼喚不回頭直向千聖叢中下腳孤峰頂上橫眠何必七日斂念相見別峰樓閣門開方參慈氏如是氣宇堪出三界之家堪報四重之恩雖然如是且諸佛道場祖師門下畢竟作麼生行履喝一喝云將此身心奉塵剎是則名為報佛恩示眾師云諸人若欲究本窮源只須識取自心不可受一切諸境所惑一動一靜處尋常作用處截斷人我脫去是非凡遇順逆境緣此心寂然靈然不變不動猶若虛空一切時中心不間斷若能如是即塵勞而得解脫即煩惱以證菩提不見石頭和尚一日問龐居士曰子自見老僧以來日用事作麼生士以偈荅曰日用事無別唯吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號丘山絕點埃神通并妙用運水及搬柴頭乃然之敢問諸人浦峰者裏日日搬柴運水動轉施為且道是神通妙用不是神通妙用若道是神通妙用正是頭上安頭若道不是神通妙用又是斬頭覓活試定當看若定當得可以彈指收功剎那證聖其或未然萬古碧潭空界月再三撈摝始應知示眾云春生夏長秋收冬藏四時遷改萬彙無常驀呈拄杖云惟有我木上座卻甚奇特迥出無遷無改之外不墮萬彙無常之中終日淨裸裸沒可把赤條條無回互顯大妙用發大神通或縱或奪或抬或搦有時教伊揚眉瞬目有時不教伊揚眉瞬目有時教伊揚眉瞬目是有時教伊揚眉瞬目不是汝等諸人還識得麼若識得超生死於剎那轉玄機於當下妙體無私圓光匪外山河大地獨露真常埜水雲